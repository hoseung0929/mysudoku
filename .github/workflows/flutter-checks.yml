name: Flutter Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Remove AppleDouble files
        run: find . -name '._*' -delete

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
